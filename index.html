<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Input Data Pengiriman</title>
    <link rel="stylesheet" href="gaya.css">
    <!-- Pustaka untuk Cetak / Unduh PDF -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
</head>
<body>
    <div class="container">
        <header class="app-header">
            <h2>Data Pengiriman</h2>
            <p>Input dan kelola data pengiriman barang dengan perhitungan otomatis</p>
        </header>

        <!-- Form Input Data Baru -->
        <section class="form-card">
            <h3>+ Tambah Data Baru</h3>
            <form id="entryForm">
                <div class="form-grid">
                    <div class="form-group">
                        <label for="tanggal">Tanggal</label>
                        <input type="text" id="tanggal" placeholder="Contoh: Jumat,24/07/26" required>
                    </div>
                    <div class="form-group">
                        <label for="supir">Supir</label>
                        <input type="text" id="supir" placeholder="Nama Supir" required>
                    </div>
                    <div class="form-group">
                        <label for="mobil">Mobil</label>
                        <input type="text" id="mobil" placeholder="No. Polisi / Jenis" required>
                    </div>
                    <div class="form-group">
                        <label for="drum">Jumlah Drum</label>
                        <input type="number" id="drum" placeholder="0" min="0" step="1" required>
                    </div>
                    <div class="form-group">
                        <label for="harga">Harga per Drum (Rp)</label>
                        <input type="number" id="harga" placeholder="0" min="0" step="100" required>
                    </div>
                    <div class="form-group">
                        <label for="totalPreview">Total Estimasi</label>
                        <input type="text" id="totalPreview" placeholder="Rp 0" readonly class="input-readonly">
                    </div>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary">Tambah ke Tabel</button>
                    <button type="reset" class="btn btn-secondary">Reset Form</button>
                </div>
            </form>
        </section>

        <!-- Tabel Rekapitulasi Data -->
        <section class="table-card">
            <div class="table-header-bar">
                <h3>Tabel Rekapitulasi Data</h3>
                <span class="badge" id="rowCount">0 Data</span>
            </div>
            
            <!-- Container khusus yang akan dijadikan PDF -->
            <div class="table-responsive" id="pdfArea">
                <div class="pdf-title-print">
                    <h2>REKAPITULASI DATA PENGIRIMAN</h2>
                    <hr style="margin-bottom: 12px; border: 1px solid #107c41;">
                </div>
                <table id="dataTable">
                    <thead>
                        <tr>
                            <th style="width: 20%;">Tanggal</th>
                            <th style="width: 20%;">Supir</th>
                            <th style="width: 18%;">Mobil</th>
                            <th style="width: 12%;">Drum</th>
                            <th style="width: 15%;">Harga</th>
                            <th style="width: 15%;">Total</th>
                            <th class="no-print" style="width: 80px;">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr>
                            <td colspan="7" class="text-center">Memuat data dari Google Sheets...</td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr class="summary-row">
                            <td colspan="3" class="text-center"><strong>TOTAL REKAPITULASI</strong></td>
                            <td id="grandTotalDrum" class="text-right"><strong>0</strong></td>
                            <td class="text-right">-</td>
                            <td id="grandTotalHarga" class="text-right"><strong>Rp 0</strong></td>
                            <td class="no-print"></td>
                        </tr>
                    </tfoot>
                </table>
            </div>

            <!-- Tombol Tambah & Unduh PDF -->
            <div class="table-actions">
                <button class="btn btn-outline" onclick="addNewRow()">+ Tambah Baris Kosong</button>
                <button class="btn btn-pdf" onclick="downloadPDF()">📄 Unduh PDF Nota</button>
            </div>
        </section>
    </div>

    <script src="script.js"></script>
</body>
</html>
